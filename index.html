<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Super Slam Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; }
  body { background:#5c94fc; user-select:none; touch-action:manipulation; }

  #page { position:absolute; inset:0; overflow:hidden; }

  #sky {
    position:absolute; inset:0; z-index:0;
    background:linear-gradient(#5c94fc 0%, #79a8ff 60%, #a8c8ff 100%);
  }

  /* ---- Clouds ---- */
  .cloud {
    position:absolute; width:120px; height:40px; background:#fff; border-radius:40px;
    opacity:.9; z-index:1;
  }
  .cloud::before, .cloud::after { content:''; position:absolute; background:#fff; border-radius:50%; }
  .cloud::before { width:55px; height:55px; top:-22px; left:18px; }
  .cloud::after  { width:42px; height:42px; top:-14px; left:62px; }
  .cloud.drift { animation:drift 60s linear infinite; }
  @keyframes drift { from { transform:translateX(-200px); } to { transform:translateX(110vw); } }

  /* ---- Ground ---- */
  #ground {
    position:absolute; left:0; right:0; bottom:0; height:90px; z-index:2;
    background:#00a800;
    border-top:8px solid #008000;
    box-shadow:inset 0 -40px 0 #007000;
  }
  #ground::before {
    content:''; position:absolute; top:8px; left:0; right:0; height:14px;
    background:repeating-linear-gradient(90deg,#00c000 0 30px,#00a800 30px 60px);
  }

  /* ---- Hero characters standing on the grass ---- */
  .hero {
    position:absolute; bottom:78px; width:46px; height:54px; z-index:3;
    animation:idle 1.4s ease-in-out infinite;
  }
  .hero.right { transform:scaleX(-1); }
  @keyframes idle { 0%,100%{ translate:0 0; } 50%{ translate:0 -6px; } }
  .hero .hat { position:absolute; top:0; left:5px; width:36px; height:16px; background:#e52521; border-radius:8px 8px 4px 4px; }
  .hero .brim { position:absolute; top:12px; left:2px; width:42px; height:6px; background:#e52521; border-radius:3px; }
  .hero .face { position:absolute; top:16px; left:8px; width:30px; height:22px; background:#ffccaa; border-radius:6px; }
  .hero .eye { position:absolute; top:21px; left:26px; width:5px; height:7px; background:#333; border-radius:2px; }
  .hero .overalls { position:absolute; top:34px; left:6px; width:34px; height:20px; background:#2e4cff; border-radius:4px; }
  .hero .shoe { position:absolute; bottom:-2px; width:16px; height:8px; background:#5a3210; border-radius:4px; }
  .hero .shoe.l { left:4px; } .hero .shoe.r { right:4px; }

  /* ---- Floating rings ---- */
  .ring {
    position:absolute; width:34px; height:34px; z-index:2;
    border:7px solid #ffd23f; border-radius:50%;
    box-shadow:0 0 8px rgba(255,210,63,.7), inset 0 0 4px rgba(180,130,0,.5);
    animation:spin 1.1s linear infinite;
  }
  @keyframes spin { 0%{transform:scaleX(1)} 50%{transform:scaleX(.25)} 100%{transform:scaleX(1)} }

  /* ---- Main content ---- */
  #home {
    position:absolute; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:20px 20px 110px;
  }
  #home h1 {
    font-size:clamp(38px,9.5vw,84px); font-weight:800; color:#ffd23f;
    text-shadow:0 5px 0 #c89a00; line-height:1.05;
  }
  #home .tagline {
    font-size:clamp(14px,3.2vw,20px); color:#fff; font-weight:600;
    margin:14px 0 34px; max-width:80vw;
  }

  .game-buttons {
    display:flex; flex-wrap:wrap; gap:26px; justify-content:center; align-items:stretch;
  }

  .game-btn {
    position:relative; display:block; text-decoration:none;
    width:min(78vw,300px); padding:26px 22px 24px;
    background:#ffd23f; border:5px solid #a05000; border-radius:22px;
    box-shadow:0 8px 0 #c89a00; cursor:pointer;
    transition:transform .08s;
  }
  .game-btn:active { transform:translateY(5px); box-shadow:0 3px 0 #c89a00; }
  .game-btn .icon {
    width:74px; height:74px; margin:0 auto 14px;
    background:#f8b800; border:4px solid #a05000; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:36px; font-weight:800; color:#a05000;
    box-shadow:inset 0 -6px 0 rgba(0,0,0,.18);
  }
  .game-btn .label { font-size:clamp(20px,4.4vw,26px); font-weight:800; color:#5a3210; line-height:1.2; }
  .game-btn .sub { font-size:14px; font-weight:600; color:#8a5a20; margin-top:8px; }

  .game-btn.sound { background:#ffd23f; }
  .game-btn.number { background:#8ed46a; box-shadow:0 8px 0 #4e8f34; }
  .game-btn.number:active { box-shadow:0 3px 0 #4e8f34; }
  .game-btn.number .icon { background:#5c94fc; color:#fff; border-color:#2a4f9e; }
  .game-btn.number .sub { color:#2f5a1c; }

  @media (max-width:700px) {
    #home { padding-bottom:100px; }
    .game-buttons { gap:18px; }
    .game-btn { padding:20px 18px 18px; }
    .game-btn .icon { width:60px; height:60px; font-size:30px; margin-bottom:10px; }
    .hero { display:none; }
  }
</style>
</head>
<body>

<div id="page">
  <div id="sky"></div>

  <div class="cloud drift" style="top:12%; left:0; animation-delay:0s;"></div>
  <div class="cloud drift" style="top:26%; left:0; animation-delay:-22s; transform:scale(.8);"></div>
  <div class="cloud drift" style="top:6%;  left:0; animation-delay:-42s; transform:scale(1.15);"></div>

  <div class="ring" style="top:22%; left:9%;"></div>
  <div class="ring" style="top:38%; left:88%;"></div>
  <div class="ring" style="top:64%; left:6%;"></div>
  <div class="ring" style="top:16%; left:78%;"></div>

  <div id="home">
    <h1>Super Slam Games</h1>
    <p class="tagline">Pick a game and start slamming those boxes!</p>

    <div class="game-buttons">
      <a class="game-btn sound" href="sound.html">
        <div class="icon">?</div>
        <div class="label">Super Sound Slam</div>
        <div class="sub">Listen, spell and jump!</div>
      </a>

      <a class="game-btn number" href="number.html">
        <div class="icon">+</div>
        <div class="label">Super Number Slam</div>
        <div class="sub">Solve, count and leap!</div>
      </a>
    </div>
  </div>

  <div class="hero" style="left:8%;"><div class="hat"></div><div class="brim"></div><div class="face"></div><div class="eye"></div><div class="overalls"></div><div class="shoe l"></div><div class="shoe r"></div></div>
  <div class="hero right" style="right:8%; animation-delay:.7s;"><div class="hat"></div><div class="brim"></div><div class="face"></div><div class="eye"></div><div class="overalls"></div><div class="shoe l"></div><div class="shoe r"></div></div>

  <div id="ground"></div>
</div>

</body>
</html>
